version: "3.8"

services:
  speech2text-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_VERSION: ${CUDA_VERSION:-12.1.0}
        BASE_DIST: ${BASE_DIST:-ubuntu22.04}
    image: speech2text-extension-service:latest
    container_name: speech2text-service
    
    # Runtime configuration for GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    # Required for NVIDIA runtime
    runtime: ${NVIDIA_RUNTIME:-nvidia}
    
    environment:
      # D-Bus session bus address - connects to host session bus
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/dbus/session_bus_socket
      # CUDA settings
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Whisper model cache directory
      - WHISPER_CACHE_DIR=/app/cache
      # Python unbuffered output
      - PYTHONUNBUFFERED=1
      # Display for any GUI operations (if needed)
      - DISPLAY=${DISPLAY:-:0}
    
    volumes:
      # D-Bus session bus socket from host
      - ${DBUS_SESSION_BUS_SOCKET:-/run/user/1000/bus}:/run/dbus/session_bus_socket:ro
      # PulseAudio socket for audio recording
      - ${PULSE_SOCKET:-/run/user/1000/pulse/native}:/run/user/1000/pulse/native:ro
      # PulseAudio configuration
      - ${PULSE_CONFIG:-~/.config/pulse}:/root/.config/pulse:ro
      # Whisper model cache (persistent)
      - whisper-cache:/app/cache
      # ALSA configuration
      - /etc/asound.conf:/etc/asound.conf:ro
      - /usr/share/alsa:/usr/share/alsa:ro
    
    # Audio device access
    devices:
      - /dev/snd:/dev/snd
    
    # Required for audio
    group_add:
      - audio
    
    # Network mode for local communication
    network_mode: host
    
    # Privileges needed for audio
    privileged: false
    
    # Restart policy
    restart: unless-stopped
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check
    healthcheck:
      test: ["CMD", "dbus-send", "--session", 
             "--dest=org.gnome.Shell.Extensions.Speech2Text",
             "--type=method_call", "--print-reply",
             "/org/gnome/Shell/Extensions/Speech2Text",
             "org.freedesktop.DBus.Peer.Ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # CPU-only variant (no GPU required)
  speech2text-service-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: speech2text-extension-service:cpu
    container_name: speech2text-service-cpu
    
    environment:
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/dbus/session_bus_socket
      - WHISPER_CACHE_DIR=/app/cache
      - PYTHONUNBUFFERED=1
    
    volumes:
      - ${DBUS_SESSION_BUS_SOCKET:-/run/user/1000/bus}:/run/dbus/session_bus_socket:ro
      - ${PULSE_SOCKET:-/run/user/1000/pulse/native}:/run/user/1000/pulse/native:ro
      - ${PULSE_CONFIG:-~/.config/pulse}:/root/.config/pulse:ro
      - whisper-cache:/app/cache
      - /etc/asound.conf:/etc/asound.conf:ro
      - /usr/share/alsa:/usr/share/alsa:ro
    
    devices:
      - /dev/snd:/dev/snd
    
    group_add:
      - audio
    
    network_mode: host
    restart: unless-stopped
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    profiles:
      - cpu

volumes:
  whisper-cache:
    driver: local
